apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: projecttools
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MarkusIntility/ProjectTools-
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc  # bytt ut med kluster-URL hvis ekstern
    namespace: project-tools
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
