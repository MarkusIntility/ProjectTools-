apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: projecttools
  namespace: project-tools
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: projecttools.intility.com  # bytt til faktisk domene
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
