apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: project-tools
  labels:
    app: backend
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        component: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/markusintility/projecttools-backend:6ee53e685f95020292deed398749d4a009fb60d5
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: projecttools-secrets
                  key: database-url
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 5
