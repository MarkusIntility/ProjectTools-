name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/projecttools-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/projecttools-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.TAG }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.TAG }}
            ${{ env.FRONTEND_IMAGE }}:latest

      - name: Update image tags in K8s manifests
        run: |
          sed -i "s|image: ghcr.io/markusintility/projecttools-backend:.*|image: ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.TAG }}|" k8s/backend/deployment.yaml
          sed -i "s|image: ghcr.io/markusintility/projecttools-frontend:.*|image: ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.TAG }}|" k8s/frontend/deployment.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend/deployment.yaml k8s/frontend/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ steps.tag.outputs.TAG }}"
          git push
